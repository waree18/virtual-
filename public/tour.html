<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Virtual Tour</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #060612; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; }
#viewer { position: fixed; inset: 0; z-index: 1; background: #060612; }
.pnlm-container { background: #060612 !important; }
.pnlm-render-container canvas { image-rendering: -webkit-optimize-contrast; }
.pnlm-controls-container { display: none !important; }
.pnlm-hotspot-base { cursor: pointer !important; }

/* ─── Scene transition overlay: prevents black flash ─── */
#transition {
  position: fixed; inset: 0; z-index: 800;
  background: #060612; opacity: 0; pointer-events: none;
  transition: opacity 0.22s ease;
}
#transition.visible { opacity: 1; pointer-events: all; }

/* ─── Initial loading overlay ─── */
#overlay {
  position: fixed; inset: 0; z-index: 900;
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
  transition: opacity 0.55s ease;
}
#overlay.out { opacity: 0; pointer-events: none; }
.ov-ring { width: 52px; height: 52px; border-radius: 50%; border: 3px solid rgba(255,255,255,.12); border-top-color: #007aff; animation: spin .75s linear infinite; }
#overlayMsg { color: rgba(255,255,255,.6); font-size: 14px; font-weight: 500; letter-spacing: .02em; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Navigation hotspot (arrow) ─── */
.hs-nav-wrap { position: relative; width: 64px; height: 64px; cursor: pointer; display: flex; align-items: center; justify-content: center; animation: hsPop .35s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes hsPop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.hs-ring  { position: absolute; inset: 0; border-radius: 50%; border: 2px solid rgba(255,255,255,.35); animation: hsRing 2.6s ease-out infinite; }
.hs-ring2 { position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid rgba(255,255,255,.15); animation: hsRing 2.6s ease-out .7s infinite; }
@keyframes hsRing { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(2.4);opacity:0} }
.hs-btn {
  position: relative; width: 54px; height: 54px; border-radius: 50%;
  background: rgba(0,0,0,.52); border: 2.5px solid rgba(255,255,255,.8);
  display: flex; align-items: center; justify-content: center;
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), background .2s, box-shadow .2s;
  box-shadow: 0 4px 22px rgba(0,0,0,.5);
}
.hs-nav-wrap:hover .hs-btn { transform: scale(1.22) translateY(-2px); background: rgba(0,122,255,.7); border-color: #fff; box-shadow: 0 6px 28px rgba(0,122,255,.5), 0 0 0 6px rgba(0,122,255,.18); }
.hs-btn svg { display: block; filter: drop-shadow(0 1px 3px rgba(0,0,0,.6)); }
.hs-label {
  position: absolute; bottom: -28px; left: 50%;
  transform: translateX(-50%) translateY(3px);
  background: rgba(0,0,0,.82); color: #fff;
  font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px;
  white-space: nowrap; pointer-events: none; border: 1px solid rgba(255,255,255,.14);
  backdrop-filter: blur(6px); opacity: 0;
  transition: opacity .18s ease, transform .18s ease;
}
.hs-nav-wrap:hover .hs-label { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── Info hotspot (Marzipano-style) ─── */
.hs-info-wrap { position: relative; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; animation: hsPop .35s cubic-bezier(.34,1.56,.64,1) .1s both; }
.hs-info-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, #ff9500, #ff6b00);
  border: 2.5px solid rgba(255,255,255,.9);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; color: #fff; font-family: Georgia, serif;
  box-shadow: 0 3px 16px rgba(255,149,0,.55);
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
  animation: infoPulse 3.2s ease-in-out infinite;
}
@keyframes infoPulse { 0%,100%{ box-shadow:0 3px 16px rgba(255,149,0,.55); } 50%{ box-shadow:0 3px 26px rgba(255,149,0,.85),0 0 0 8px rgba(255,149,0,.12); } }
.hs-info-wrap:hover .hs-info-btn { transform: scale(1.22); box-shadow: 0 6px 26px rgba(255,149,0,.7); }
.hs-info-label { position: absolute; bottom: -26px; left: 50%; transform: translateX(-50%); background: rgba(200,90,0,.88); color: #fff; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .18s; }
.hs-info-wrap:hover .hs-info-label { opacity: 1; }

/* ─── Info popup ─── */
#infoPopup { position: fixed; inset: 0; z-index: 600; display: flex; align-items: center; justify-content: center; padding: 20px; background: rgba(0,0,0,.5); backdrop-filter: blur(6px); opacity: 0; pointer-events: none; transition: opacity .25s ease; }
#infoPopup.visible { opacity: 1; pointer-events: all; }
#infoCard { background: rgba(255,255,255,.97); border-radius: 20px; padding: 28px; max-width: 380px; width: 100%; box-shadow: 0 24px 64px rgba(0,0,0,.3); transform: scale(.93) translateY(12px); transition: transform .28s cubic-bezier(.34,1.56,.64,1); position: relative; }
#infoPopup.visible #infoCard { transform: scale(1) translateY(0); }
#infoCardTitle { font-size: 18px; font-weight: 800; color: #0d1117; font-family: 'Space Grotesk',-apple-system,sans-serif; margin-bottom: 10px; padding-right: 32px; line-height: 1.25; }
#infoCardBody { font-size: 14px; line-height: 1.7; color: #4a5568; }
#infoCardClose { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,.08); border: none; cursor: pointer; font-size: 16px; color: #666; display: flex; align-items: center; justify-content: center; transition: background .15s, transform .15s; }
#infoCardClose:hover { background: rgba(0,0,0,.15); transform: scale(1.1); }
#infoCardIcon { font-size: 32px; margin-bottom: 12px; }

/* ─── VR Cardboard modal ─── */
#vrModal { position: fixed; inset: 0; z-index: 700; background: rgba(0,0,0,.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .25s ease; }
#vrModal.visible { opacity: 1; pointer-events: all; }
#vrCard { background: #1a1a2e; border-radius: 20px; border: 1px solid rgba(255,255,255,.1); padding: 28px 24px 24px; max-width: 340px; width: 100%; box-shadow: 0 24px 64px rgba(0,0,0,.5); text-align: center; transform: scale(.92) translateY(16px); transition: transform .28s cubic-bezier(.34,1.56,.64,1); }
#vrModal.visible #vrCard { transform: scale(1) translateY(0); }
#vrCard h3 { color: #fff; font-size: 19px; font-weight: 800; margin-bottom: 6px; }
#vrCard p  { color: rgba(255,255,255,.6); font-size: 13px; line-height: 1.6; margin-bottom: 18px; }
.vr-icon { font-size: 52px; margin-bottom: 14px; }
.vr-steps { text-align: left; margin-bottom: 20px; }
.vr-step { display: flex; gap: 12px; align-items: flex-start; color: rgba(255,255,255,.75); font-size: 13px; margin-bottom: 10px; }
.vr-step-n { width: 22px; height: 22px; border-radius: 50%; background: #007aff; color: #fff; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.vr-btn { width: 100%; padding: 13px; border: none; border-radius: 12px; background: linear-gradient(135deg,#007aff,#33a8ff); color: #fff; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; box-shadow: 0 5px 18px rgba(0,122,255,.4); transition: transform .15s; margin-bottom: 10px; }
.vr-btn:hover { transform: translateY(-2px); }
.vr-btn-cancel { width: 100%; padding: 10px; border: 1.5px solid rgba(255,255,255,.2); border-radius: 12px; background: transparent; color: rgba(255,255,255,.6); font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s; }
.vr-btn-cancel:hover { background: rgba(255,255,255,.06); }

/* ─── Sidebar ─── */
#sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 264px; z-index: 200; background: rgba(255,255,255,.97); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); border-right: 1px solid rgba(0,0,0,.07); box-shadow: 4px 0 40px rgba(0,0,0,.16); display: flex; flex-direction: column; transform: translateX(0); transition: transform .38s cubic-bezier(.4,0,.2,1); animation: sbIn .5s cubic-bezier(.4,0,.2,1) both; }
@keyframes sbIn { from{opacity:0;transform:translateX(-32px)} to{opacity:1;transform:translateX(0)} }
#sidebar.closed { transform: translateX(-100%); }
.sb-hd { display: flex; align-items: center; gap: 10px; padding: 14px 12px 14px 16px; border-bottom: 1px solid rgba(0,0,0,.06); flex-shrink: 0; }
.sb-hd-logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg,#007aff,#a78bfa); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.sb-hd strong { font-size: 15px; font-weight: 700; color: #0d1117; flex: 1; }
.sb-hd img { width: 36px; height: 36px; border-radius: 10px; object-fit: cover; }
/* Close button inside sidebar header */
.sb-close {
  width: 30px; height: 30px; border-radius: 8px; border: none;
  background: rgba(0,0,0,.06); cursor: pointer; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  font-size: 14px; color: #666;
  transition: background .15s, transform .15s;
}
.sb-close:hover { background: rgba(0,0,0,.13); transform: scale(1.1); }
.sb-list { flex: 1; overflow-y: auto; padding: 10px; }
.sb-list::-webkit-scrollbar { width: 3px; }
.sb-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,.1); border-radius: 2px; }
.sb-btn { width: 100%; text-align: left; padding: 9px 12px; border: none; border-radius: 10px; background: transparent; color: #0d1117; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 9px; transition: background .14s, transform .12s; margin-bottom: 2px; }
.sb-num { width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; background: rgba(0,122,255,.1); color: #007aff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.sb-btn:hover { background: rgba(0,122,255,.08); }
.sb-btn.active { background: rgba(0,122,255,.13); color: #007aff; font-weight: 700; }
.sb-btn.active .sb-num { background: rgba(0,122,255,.22); }
.sb-btn:active { transform: scale(.97); }
.sb-ft { padding: 14px; border-top: 1px solid rgba(0,0,0,.06); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.sb-ft-btn { width: 100%; padding: 10px; border: 1.5px solid rgba(0,122,255,.3); border-radius: 10px; background: transparent; color: #007aff; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s; }
.sb-ft-btn:hover { background: rgba(0,122,255,.07); }
#sbTab { position: fixed; z-index: 210; left: 266px; top: 50%; transform: translateY(-50%); width: 22px; height: 50px; background: rgba(255,255,255,.93); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,.08); border-left: none; border-radius: 0 12px 12px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #8a94a6; box-shadow: 3px 0 12px rgba(0,0,0,.1); transition: left .38s cubic-bezier(.4,0,.2,1), background .15s; }
#sbTab:hover { background: rgba(0,122,255,.1); color: #007aff; }
#sbTab.closed { left: 0; }
/* Mobile backdrop — tap outside sidebar to close */
#sbBackdrop { position: fixed; inset: 0; z-index: 190; background: rgba(0,0,0,.35); opacity: 0; pointer-events: none; transition: opacity .3s ease; }
#sbBackdrop.visible { opacity: 1; pointer-events: all; }

/* ─── Top bar ─── */
#topbar { position: fixed; top: 14px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 8px; z-index: 300; pointer-events: none; animation: tbIn .5s ease .15s both; }
@keyframes tbIn { from{opacity:0;transform:translateX(-50%) translateY(-14px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.pill { background: rgba(255,255,255,.92); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.5); border-radius: 100px; padding: 9px 22px; font-size: 14px; font-weight: 700; color: #0d1117; box-shadow: 0 4px 18px rgba(0,0,0,.16); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: auto; }
.icon-btn { background: rgba(255,255,255,.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.5); border-radius: 100px; padding: 9px 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 16px rgba(0,0,0,.12); transition: transform .15s, box-shadow .2s; pointer-events: auto; font-family: inherit; }
.icon-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,0,0,.18); }
.icon-btn:active { transform: scale(.96); }
.icon-btn.vr-on { background: #007aff; }
.icon-btn.vr-on svg path,.icon-btn.vr-on svg rect,.icon-btn.vr-on svg circle { stroke: #fff; }
#counter { position: fixed; top: 14px; right: 16px; z-index: 300; background: rgba(0,0,0,.55); backdrop-filter: blur(12px); color: #fff; font-size: 12px; font-weight: 700; padding: 5px 13px; border-radius: 100px; animation: fadeIn .4s ease .3s both; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ─── Bottom controls ─── */
#controls { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 8px; z-index: 300; animation: ctrlIn .5s ease .2s both; }
@keyframes ctrlIn { from{opacity:0;transform:translateX(-50%) translateY(16px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.nav-btn { background: rgba(255,255,255,.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.5); border-radius: 100px; padding: 10px 22px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; color: #0d1117; box-shadow: 0 4px 16px rgba(0,0,0,.14); transition: transform .15s, box-shadow .2s; }
.nav-btn:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 22px rgba(0,0,0,.18); }
.nav-btn:active { transform: scale(.96); }
.dot { width: 7px; height: 7px; border-radius: 50%; border: none; padding: 0; cursor: pointer; transition: transform .18s, background .18s; background: rgba(255,255,255,.45); }
.dot:hover { transform: scale(1.5); }

/* ─── Fullscreen: auto-hide sidebar ─── */
:fullscreen #sidebar,          :-webkit-full-screen #sidebar  { transform: translateX(-100%) !important; }
:fullscreen #sbTab,            :-webkit-full-screen #sbTab    { display: none !important; }

/* ─── Mobile: bottom sheet ─── */
@media (max-width: 640px) {
  #sidebar { width: 100%; top: auto; bottom: 0; height: 54vh; border-right: none; border-top: 1px solid rgba(0,0,0,.08); border-radius: 20px 20px 0 0; transform: translateY(0); animation: sbMobIn .4s ease both; }
  @keyframes sbMobIn { from{transform:translateY(100%)} to{transform:translateY(0)} }
  #sidebar.closed { transform: translateY(100%) !important; }
  #sbTab { display: none; }
  #topbar { left: 10px; transform: none; animation: fadeIn .4s ease .15s both; }
  #sbBackdrop.visible { display: block; }
}
</style>
</head>
<body>

<div id="overlay"><div class="ov-ring"></div><div id="overlayMsg">Loading tour…</div></div>
<div id="transition"></div>
<div id="viewer"></div>
<!-- Mobile backdrop -->
<div id="sbBackdrop" onclick="toggleSidebar()"></div>

<!-- Info popup -->
<div id="infoPopup" onclick="if(event.target===this)closeInfo()">
  <div id="infoCard">
    <button id="infoCardClose" onclick="closeInfo()">✕</button>
    <div id="infoCardIcon"></div>
    <div id="infoCardTitle"></div>
    <div id="infoCardBody"></div>
  </div>
</div>

<!-- VR modal -->
<div id="vrModal">
  <div id="vrCard">
    <div class="vr-icon">📱🥽</div>
    <h3>Google Cardboard VR</h3>
    <p>Immersive split-screen stereo experience</p>
    <div class="vr-steps">
      <div class="vr-step"><div class="vr-step-n">1</div><div>Open in Chrome on Android</div></div>
      <div class="vr-step"><div class="vr-step-n">2</div><div>Tap <strong>Enter VR</strong> — screen splits in two</div></div>
      <div class="vr-step"><div class="vr-step-n">3</div><div>Insert phone into Google Cardboard viewer</div></div>
      <div class="vr-step"><div class="vr-step-n">4</div><div>Look around — gyroscope guides your view</div></div>
    </div>
    <button class="vr-btn" id="vrConfirm">🥽 Enter VR Mode</button>
    <button class="vr-btn-cancel" onclick="closeVrModal()">Cancel</button>
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sb-hd">
    <img src="/logo.png" alt="" id="sbLogo" onerror="this.style.display='none';document.getElementById('sbFallback').style.display='flex'">
    <div class="sb-hd-logo" id="sbFallback" style="display:none">🌐</div>
    <strong>Virtual Tour</strong>
    <button class="sb-close" onclick="toggleSidebar()" title="Close menu">✕</button>
  </div>
  <div class="sb-list" id="sceneList"></div>
  <div class="sb-ft"><button class="sb-ft-btn" id="btnLogout">← Sign Out</button></div>
</div>
<!-- Tab: ❮ when open (click to close), ❯ when closed (click to open) -->
<button id="sbTab" onclick="toggleSidebar()" aria-label="Toggle menu">❮</button>

<!-- Top bar -->
<div id="topbar">
  <div class="pill" id="titlePill">Loading…</div>
  <button class="icon-btn" id="btnFS" onclick="toggleFullscreen()" title="Fullscreen (F)">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#0d1117" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
      <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
    </svg>
  </button>
  <button class="icon-btn" id="btnVR" title="VR / Google Cardboard (V)">
    <svg width="19" height="13" viewBox="0 0 38 22" fill="none" stroke="#0d1117" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="1" y="1" width="36" height="20" rx="4"/>
      <circle cx="12" cy="11" r="4.5"/><circle cx="26" cy="11" r="4.5"/>
      <path d="M16.5 11 h5"/>
    </svg>
  </button>
</div>

<div id="counter">1 / 1</div>

<div id="controls">
  <button class="nav-btn" id="btnPrev" onclick="prevScene()">← Prev</button>
  <div id="dotRow" style="display:flex;gap:6px;align-items:center"></div>
  <button class="nav-btn" id="btnNext" onclick="nextScene()">Next →</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<script>
/* ══ STATE ══ */
let viewer = null, scenes = {}, ids = [], curIdx = 0;
let sbOpen = true, vrMode = false, isLoading = false, pendingScene = -1;

/* ══ INIT ══ */
window.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('btnLogout').addEventListener('click', doLogout);
  document.getElementById('btnVR').addEventListener('click', openVrModal);
  document.getElementById('vrConfirm').addEventListener('click', doEnterVR);
  try {
    setMsg('Fetching scenes…');
    const r = await fetch('/api/export');
    if (!r.ok) throw new Error('Server error ' + r.status);
    scenes = await r.json();
    ids = Object.keys(scenes);
    if (!ids.length) { setMsg('No scenes available yet.'); return; }
    buildSceneList(); buildDots(); goToScene(0);
  } catch(err) { setMsg('Failed to load: ' + err.message); }
});

/* ══ SCENE LOADER — BLACK SCREEN FIX ══
   Flow: fade-in dark overlay → destroy old viewer →
   init new pannellum → on load: fade out overlay
   User sees smooth dark-crossfade, never raw black canvas.
*/
function goToScene(idx) {
  idx = ((idx % ids.length) + ids.length) % ids.length;
  if (isLoading) { pendingScene = idx; return; }
  if (idx === curIdx && viewer) return;
  curIdx = idx; isLoading = true; pendingScene = -1;

  const s = scenes[ids[idx]];
  if (!s?.panorama) { isLoading = false; return; }

  // Step 1: fade in transition overlay
  const tr = document.getElementById('transition');
  tr.classList.add('visible');

  // Step 2: wait for overlay, then swap viewer
  setTimeout(() => {
    if (viewer) { try { viewer.destroy(); } catch(_){} viewer = null; }
    document.getElementById('viewer').innerHTML = '';

    const hotSpots = buildHotspots(s.hotSpots || []);
    const secure = location.protocol === 'https:' || ['localhost','127.0.0.1'].includes(location.hostname);
    const mobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    try {
      viewer = pannellum.viewer('viewer', {
        type: 'equirectangular', panorama: s.panorama, autoLoad: true,
        showControls: false, friction: 0.12, minPitch: -85, maxPitch: 85,
        hotSpots, orientationOnByDefault: mobile && secure
      });
      viewer.on('load', () => {
        // Step 3: fade out → reveal new scene
        tr.classList.remove('visible');
        hideOverlay(); updateUI(ids[idx]); isLoading = false;
        if (pendingScene >= 0) { const n = pendingScene; pendingScene = -1; setTimeout(() => goToScene(n), 80); }
      });
      viewer.on('error', () => {
        tr.classList.remove('visible');
        if (mobile && secure) { isLoading = false; retryNoGyro(idx); }
        else isLoading = false;
      });
    } catch(e) { tr.classList.remove('visible'); isLoading = false; console.error(e); }
  }, 140);
}

function retryNoGyro(idx) {
  if (viewer) { try { viewer.destroy(); } catch(_){} viewer = null; }
  document.getElementById('viewer').innerHTML = '';
  const s = scenes[ids[idx]];
  try {
    viewer = pannellum.viewer('viewer', {
      type:'equirectangular', panorama:s.panorama, autoLoad:true,
      showControls:false, hotSpots: buildHotspots(s.hotSpots||[]), orientationOnByDefault:false
    });
    viewer.on('load', () => { hideOverlay(); updateUI(ids[idx]); });
  } catch(e) { console.error(e); }
}

/* ══ HOTSPOT FACTORY — nav + info types ══ */
function buildHotspots(list) {
  return list.map(h => ({
    pitch: parseFloat(h.pitch)||0, yaw: parseFloat(h.yaw)||0, type:'custom',
    createTooltipFunc: h.type === 'info' ? makeInfoHotspot : makeNavHotspot,
    createTooltipArgs: h.type === 'info'
      ? { title: h.text||h.label||'Info', body: h.infoText||'' }
      : { targetId: h.sceneId, targetTitle: scenes[h.sceneId]?.title || h.text || '→' }
  }));
}

function makeNavHotspot(div, args) {
  Object.assign(div.style,{width:'64px',height:'64px',background:'none',border:'none',cursor:'pointer',overflow:'visible'});
  const wrap=ce('div','hs-nav-wrap'), ring=ce('div','hs-ring'), ring2=ce('div','hs-ring2');
  const btn=ce('div','hs-btn'); btn.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>';
  const lbl=ce('div','hs-label'); lbl.textContent=args.targetTitle;
  wrap.append(ring,ring2,btn,lbl); div.appendChild(wrap);
  div.addEventListener('click',e=>{ e.stopPropagation(); const i=ids.indexOf(args.targetId); if(i>=0)goToScene(i); });
}

function makeInfoHotspot(div, args) {
  Object.assign(div.style,{width:'40px',height:'40px',background:'none',border:'none',cursor:'pointer',overflow:'visible'});
  const wrap=ce('div','hs-info-wrap'), btn=ce('div','hs-info-btn'); btn.textContent='i';
  const lbl=ce('div','hs-info-label'); lbl.textContent=args.title;
  wrap.append(btn,lbl); div.appendChild(wrap);
  div.addEventListener('click',e=>{ e.stopPropagation(); openInfo(args.title,args.body); });
}

function ce(tag,cls){ const el=document.createElement(tag); el.className=cls; return el; }

/* ══ INFO POPUP ══ */
function openInfo(title,body) {
  document.getElementById('infoCardTitle').textContent = title||'';
  document.getElementById('infoCardBody').innerHTML = body ? body.replace(/\n/g,'<br>') : '<em style="color:#aaa">No description.</em>';
  document.getElementById('infoCardIcon').textContent='💬';
  document.getElementById('infoPopup').classList.add('visible');
}
function closeInfo() { document.getElementById('infoPopup').classList.remove('visible'); }

/* ══ VR ══ */
function openVrModal() { if(vrMode){doExitVR();return;} document.getElementById('vrModal').classList.add('visible'); }
function closeVrModal() { document.getElementById('vrModal').classList.remove('visible'); }

async function doEnterVR() {
  closeVrModal(); if(!viewer)return;
  if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
    try{ const p=await DeviceOrientationEvent.requestPermission(); if(p!=='granted'){alert('Gyroscope permission required.');return;} }catch(e){console.warn(e);}
  }
  try {
    viewer.toggleStereo(); vrMode=true;
    document.getElementById('btnVR').classList.add('vr-on');
    const el=document.documentElement;
    if(el.requestFullscreen) el.requestFullscreen().catch(()=>{});
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    if(screen.orientation?.lock) screen.orientation.lock('landscape').catch(()=>{});
  } catch(e){ alert('VR not supported. Try Chrome on Android.'); }
}
function doExitVR() {
  if(!vrMode)return;
  try{viewer.toggleStereo();}catch(_){}
  vrMode=false; document.getElementById('btnVR').classList.remove('vr-on');
  if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
  else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
  if(screen.orientation?.unlock) screen.orientation.unlock();
}

/* ══ UI ══ */
function updateUI(sceneId) {
  const title=scenes[sceneId]?.title||sceneId;
  document.getElementById('titlePill').textContent=title;
  document.title=title+' — Virtual Tour';
  document.getElementById('counter').textContent=`${curIdx+1} / ${ids.length}`;
  document.querySelectorAll('.sb-btn').forEach((b,i)=>b.classList.toggle('active',i===curIdx));
  document.querySelectorAll('.dot').forEach((d,i)=>{ d.style.background=i===curIdx?'#007aff':'rgba(255,255,255,.45)'; d.style.transform=i===curIdx?'scale(1.5)':'scale(1)'; });
  fetch('/api/visit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sceneId})}).catch(()=>{});
}

function buildSceneList() {
  const el=document.getElementById('sceneList'); el.innerHTML='';
  ids.forEach((id,i)=>{ const b=document.createElement('button'); b.className='sb-btn'; b.style.animationDelay=(i*28)+'ms'; b.innerHTML=`<span class="sb-num">${i+1}</span>${esc(scenes[id].title||'Scene '+(i+1))}`; b.onclick=()=>goToScene(i); el.appendChild(b); });
}
function buildDots() {
  const row=document.getElementById('dotRow'); row.innerHTML='';
  const n=Math.min(ids.length,16);
  for(let i=0;i<n;i++){ const d=document.createElement('button'); d.className='dot'; d.title=scenes[ids[i]]?.title||''; d.style.background=i===0?'#007aff':'rgba(255,255,255,.45)'; const ii=i; d.onclick=()=>goToScene(ii); row.appendChild(d); }
}
function setMsg(m){const el=document.getElementById('overlayMsg');if(el)el.textContent=m;}
function hideOverlay(){ const ov=document.getElementById('overlay'); if(!ov||ov.classList.contains('out'))return; ov.classList.add('out'); setTimeout(()=>{try{ov.remove();}catch(_){}},700); }
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ══ NAVIGATION ══ */
function prevScene(){goToScene(curIdx-1);}
function nextScene(){goToScene(curIdx+1);}

/* ══ SIDEBAR ══ */
function toggleSidebar() {
  sbOpen = !sbOpen;
  const sb   = document.getElementById('sidebar');
  const tab  = document.getElementById('sbTab');
  const back = document.getElementById('sbBackdrop');
  sb.classList.toggle('closed', !sbOpen);
  tab.classList.toggle('closed', !sbOpen);
  // ❮ = sidebar is open (click to CLOSE)  |  ❯ = sidebar is closed (click to OPEN)
  tab.textContent = sbOpen ? '❮' : '❯';
  tab.style.left  = sbOpen ? '266px' : '0';
  if (back) back.classList.toggle('visible', sbOpen);
}

/* ══ FULLSCREEN ══ */
let sbWasOpenBeforeFS=true;
function toggleFullscreen() {
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    sbWasOpenBeforeFS=sbOpen; const el=document.documentElement;
    (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el);
  } else { (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document); }
}
function onFSChange() {
  const isFS=!!(document.fullscreenElement||document.webkitFullscreenElement);
  const back = document.getElementById('sbBackdrop');
  if(isFS){
    if(sbOpen){
      document.getElementById('sidebar').classList.add('closed');
      const tab=document.getElementById('sbTab');
      tab.classList.add('closed'); tab.textContent='❯'; tab.style.left='0';
      if(back) back.classList.remove('visible');
      sbOpen=false;
    }
  } else {
    if(!vrMode)doExitVR();
    if(sbWasOpenBeforeFS&&!sbOpen){
      document.getElementById('sidebar').classList.remove('closed');
      const tab=document.getElementById('sbTab');
      tab.classList.remove('closed'); tab.textContent='❮'; tab.style.left='266px';
      if(back) back.classList.toggle('visible', true);
      sbOpen=true;
    }
  }
  setTimeout(()=>window.dispatchEvent(new Event('resize')),150);
}
document.addEventListener('fullscreenchange',onFSChange);
document.addEventListener('webkitfullscreenchange',onFSChange);

/* ══ LOGOUT ══ */
async function doLogout(){await fetch('/api/logout',{method:'POST'}).catch(()=>{});location.href='/logout.html';}

/* ══ KEYBOARD ══ */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  const ip=document.getElementById('infoPopup'),vr=document.getElementById('vrModal');
  switch(e.key){
    case 'ArrowLeft':case'a':case'A':prevScene();break;
    case 'ArrowRight':case'd':case'D':nextScene();break;
    case 'f':case'F':toggleFullscreen();break;
    case 'm':case'M':toggleSidebar();break;
    case 'v':case'V':openVrModal();break;
    case 'Escape':
      if(vrMode)doExitVR();
      else if(ip.classList.contains('visible'))closeInfo();
      else if(vr.classList.contains('visible'))closeVrModal();
      else if(!sbOpen)toggleSidebar();
      break;
  }
});

/* ══ TOUCH SWIPE ══ */
let txS=0,tyS=0;
document.getElementById('viewer').addEventListener('touchstart',e=>{txS=e.touches[0].clientX;tyS=e.touches[0].clientY;},{passive:true});
document.getElementById('viewer').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-txS,dy=e.changedTouches[0].clientY-tyS;if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.5){dx>0?prevScene():nextScene();}},{passive:true});
</script>
